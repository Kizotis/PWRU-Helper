name: Release

# Tag a commit with e.g. v0.9.0 and push the tag to build BOTH release artifacts and
# publish a GitHub Release:
#   • PWRUHelper.exe                 — portable single-file build (no install)
#   • PWRUHelper-<version>-setup.msi — WiX installer (Start-menu/desktop shortcuts, ARP entry)
# The app's built-in update check reads this release's tag; winget points at the exe/msi.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run unit tests
        run: dotnet test tests/PWRUHelper.Tests -c Release

      - name: Install WiX v5 toolset
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2

      - name: Publish portable single-file exe
        run: >
          dotnet publish PWRUHelper.csproj -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none

      - name: Build MSI installer + stage both artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')     # "v0.9.0" -> "0.9.0"
          $exe = "bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/PWRUHelper.exe"
          if (-not (Test-Path $exe)) { throw "Published exe not found at $exe" }

          New-Item -ItemType Directory -Force dist | Out-Null

          # The installer wraps the very exe we just published, so the portable download and
          # the MSI ship the exact same build.
          wix build installer/Product.wxs -ext WixToolset.UI.wixext -arch x64 `
            -d Version="$version.0" `
            -d ExeFile="$exe" `
            -d IconFile="assets/icon.ico" `
            -d LicenseFile="installer/license.rtf" `
            -o "dist/PWRUHelper-$version-setup.msi"

          Copy-Item $exe "dist/PWRUHelper.exe"
          Get-ChildItem dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PWRU Helper ${{ github.ref_name }}
          files: |
            dist/PWRUHelper.exe
            dist/PWRUHelper-*-setup.msi
          generate_release_notes: true

      # Opens/updates the winget-pkgs PR for this release. Opt-in: only runs on a real tag and
      # only when a WINGET_TOKEN secret (a GitHub PAT that can fork/PR microsoft/winget-pkgs) is
      # set — otherwise it prints how to enable it and exits cleanly.
      # NOTE: `update` needs the package to already exist on winget; do the very first submission
      # once by hand with `wingetcreate new` (see packaging/DISTRIBUTION.md).
      # continue-on-error: the release itself is already published by the previous step — a
      # winget hiccup (first-ever submission, aka.ms outage, PR conflict) must not turn the
      # whole release run red.
      - name: Submit to winget (if configured)
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if (-not $env:WINGET_TOKEN) {
            Write-Host "WINGET_TOKEN secret not set — skipping winget submission."
            Write-Host "To enable: create a classic PAT with 'public_repo' scope and add it as the"
            Write-Host "repository secret WINGET_TOKEN. Then each tagged release auto-opens a winget PR."
            exit 0
          }
          $version = "${{ github.ref_name }}".TrimStart('v')
          $msiUrl  = "https://github.com/Kizotis/PWRU-Helper/releases/download/${{ github.ref_name }}/PWRUHelper-$version-setup.msi"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          ./wingetcreate.exe update Kizotis.PWRUHelper --version $version --urls "$msiUrl" --submit --token $env:WINGET_TOKEN
