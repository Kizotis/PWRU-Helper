name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build app (Release)
        run: dotnet build PWRUHelper.csproj -c Release

      - name: Run unit tests
        run: dotnet test tests/PWRUHelper.Tests -c Release
